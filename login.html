<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Duozo Stock - Manager Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .login-container {
            background: white;
            padding: 50px;
            border-radius: 10px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 400px;
        }
        .logo {
            text-align: center;
            margin-bottom: 30px;
        }
        .logo h1 {
            color: #667eea;
            font-size: 32px;
            margin-bottom: 5px;
        }
        .logo p {
            color: #999;
            font-size: 14px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            color: #333;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 14px;
        }
        select, input {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        select:focus, input:focus {
            outline: none;
            border-color: #667eea;
        }
        .login-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
            margin-top: 10px;
        }
        .login-btn:hover {
            transform: translateY(-2px);
        }
        .login-btn:active {
            transform: translateY(0);
        }
        .error {
            background: #f8d7da;
            color: #721c24;
            padding: 12px;
            border-radius: 5px;
            margin-bottom: 20px;
            font-size: 14px;
        }
        .demo-credentials {
            background: #f0f4ff;
            padding: 15px;
            border-radius: 5px;
            margin-top: 25px;
            border-left: 4px solid #667eea;
        }
        .demo-credentials h3 {
            color: #667eea;
            font-size: 14px;
            margin-bottom: 10px;
        }
        .demo-credentials p {
            color: #555;
            font-size: 13px;
            margin: 5px 0;
            font-family: monospace;
        }
        .outlet-option {
            padding: 10px 0;
            border-bottom: 1px solid #f0f0f0;
        }
        .outlet-option:last-child {
            border-bottom: none;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <h1>📦 Duozo Stock</h1>
            <p>Outlet Inventory Manager</p>
        </div>

        {% if error %}
        <div class="error">
            ❌ {{ error }}
        </div>
        {% endif %}

        <form method="POST">
            <div class="form-group">
                <label for="outlet">Select Your Outlet:</label>
                <select name="outlet_name" id="outlet" required>
                    <option value="">-- Choose an outlet --</option>
                    <option value="Nehru Place">Nehru Place</option>
                    <option value="Lajpat Nagar">Lajpat Nagar</option>
                    <option value="South Extension">South Extension</option>
                </select>
            </div>

            <div class="form-group">
                <label for="password">Password:</label>
                <input type="password" name="password" id="password" placeholder="Enter password" required>
            </div>

            <button type="submit" class="login-btn">🔓 Login</button>
        </form>

        <div class="demo-credentials">
            <h3>📝 Demo Credentials</h3>
            <div class="outlet-option">
                <strong>Nehru Place</strong><br>
                <p>Password: nehru123</p>
            </div>
            <div class="outlet-option">
                <strong>Lajpat Nagar</strong><br>
                <p>Password: lajpat123</p>
            </div>
            <div class="outlet-option">
                <strong>South Extension</strong><br>
                <p>Password: south123</p>
            </div>
        </div>
    </div>
</body>
</html>
